name: TorneAR CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check (TypeScript)
      run: npx tsc --noEmit

    # Descomenta esto si tienes configurado ESLint en tu package.json ("lint": "expo lint")
    # - name: Run Linter
    #   run: npm run lint
